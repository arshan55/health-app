steps:
  # ─── BACKEND ──────────────────────────────────────────────────────────────

  # Build Backend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/nutriguide-backend'
      - './backend'
    id: 'Build Backend'

  # Push Backend image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/nutriguide-backend']
    id: 'Push Backend'
    waitFor: ['Build Backend']

  # Deploy Backend to Cloud Run with secrets injected
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'nutriguide-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/nutriguide-backend'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'DATABASE_URL=sqlite+aiosqlite:///./nutriguide.db,SECRET_KEY=$$SECRET_KEY,GEMINI_API_KEY=$$GEMINI_API_KEY'
      - '--update-secrets'
      - 'SECRET_KEY=nutriguide-secret-key:latest,GEMINI_API_KEY=nutriguide-gemini-key:latest'
    id: 'Deploy Backend'
    waitFor: ['Push Backend']

  # ─── FRONTEND ─────────────────────────────────────────────────────────────

  # Build Frontend Docker image (bake in the real backend URL at build time)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/nutriguide-frontend'
      - '--build-arg'
      - 'NEXT_PUBLIC_API_URL=https://nutriguide-backend-$PROJECT_NUMBER-uc.a.run.app/api/v1'
      - './frontend'
    id: 'Build Frontend'
    waitFor: ['Deploy Backend']

  # Push Frontend image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/nutriguide-frontend']
    id: 'Push Frontend'
    waitFor: ['Build Frontend']

  # Deploy Frontend to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'nutriguide-frontend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/nutriguide-frontend'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
    id: 'Deploy Frontend'
    waitFor: ['Push Frontend']

images:
  - 'gcr.io/$PROJECT_ID/nutriguide-backend'
  - 'gcr.io/$PROJECT_ID/nutriguide-frontend'
